<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    {% if page.description or site.description %}
    <meta name="description" content="{{ page.description | default: site.description }}">
    {% endif %}
    {% if page.image %}
    <meta property="og:image" content="{{ page.image }}">
    {% endif %}
    <style>
      :root{
        --fg:#111; --bg:#fff; --muted:#666; --link:#0b5bd3; --rule:#e5e5e5;
      }
      html,body{height:100%}
      body{margin:0; color:var(--fg); background:var(--bg); font:16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"}
      .container{max-width: 860px; margin: 0 auto; padding: 24px}
      h1,h2,h3{line-height:1.25}
      h1{font-size:2rem; margin-top:0.2rem}
      hr{border:0; border-top:1px solid var(--rule); margin:24px 0}
      img{max-width:100%; height:auto}
      code{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 0.95em; background:#f6f8fa; padding:0.1em 0.3em; border-radius:4px}
      table{border-collapse:collapse; width:100%;}
      th,td{border:1px solid var(--rule); padding:6px 8px; text-align:left}
      a{color:var(--link); text-decoration:none}
      a:hover{text-decoration:underline}
      blockquote{margin:0; padding-left:1em; border-left:4px solid var(--rule); color:var(--muted)}
    </style>
  </head>
  <body>
    <main class="container">
      {{ content }}
    </main>
  </body>
  </html>
